spring.application.name=bookbud

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bookbud?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=lolp0980
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=mySecretKeyForJwtTokenGeneration1234567890123456
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.colo.bookbud=DEBUG
